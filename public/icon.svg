  </defs>
  <!-- Sphere -->
  <circle cx="12" cy="16" r="7.5" fill="none" stroke="white" stroke-width="1.4" stroke-opacity="0.85"/>
  <!-- Crescent shadow -->
  <path d="M 14.5 9.5 A 7.5 7.5 0 0 1 14.5 22.5 A 5.8 7.5 0 0 0 14.5 9.5 Z" fill="white" fill-opacity="0.08"/>
  <!-- Lower streak (bold) -->
  <polygon points="18,14.5 30,12.5 30,13.5 18,16" fill="url(#fs)"/>
  <!-- Upper streak (thin) -->
  <polygon points="17,13 29,10 29,10.6 17,13.6" fill="url(#fs2)"/>
